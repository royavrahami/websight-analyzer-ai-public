name: Quality Gate

# Installs the package and runs the import smoke tests, so the package-import
# structure (no sys.path hacks, full analyzer class loads) stays green.

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import smoke tests
        run: pytest tests/ -p no:cacheprovider

      - name: Lint (ruff)
        # Non-blocking for now: the legacy modules carry pre-existing lint debt.
        # Tracked for incremental cleanup; surfaced here for visibility.
        run: ruff check core/ tests/
        continue-on-error: true
